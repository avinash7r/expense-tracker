apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - namespace.yaml

namespace: dev

images:
  - name: avinashrajure/expense-tracker-server
    newTag: latest
  - name: avinashrajure/expense-tracker-frontend
    newTag: latest

patches:
  - path: patch-server.yaml
  - path: patch-client-route.yaml
    target:
      kind: HTTPRoute
      name: client-route

configMapGenerator:
  - name: server-config
    envs:
      - config/app-config.env


