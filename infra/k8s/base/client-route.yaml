apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: client-route
spec:
  parentRefs:
    - name: shared-alb
      namespace: infra
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /client
      backendRefs:
        - name: client-service
          port: 80

---

apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: client-service
spec:
  targetReference:
    kind: Service
    name: client-service
  defaultConfiguration:
    targetType: ip