name: expense-tracker-ci

on:
  push:
    branches: [main, devops/ci-cd]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.changes.outputs.server_any_changed }}
      frontend: ${{ steps.changes.outputs.frontend_any_changed }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: detect changes
        id: changes
        uses: tj-actions/changed-files@v46.0.1
        with:
          files_yaml: |
            server:
              - 'server/**'
            frontend:
              - 'frontend/**'

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true' || needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: build and push server image
        if: needs.detect-changes.outputs.server == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/expense-tracker-server:latest
            ${{ secrets.DOCKER_USERNAME }}/expense-tracker-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: build and push frontend image
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/expense-tracker-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/expense-tracker-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
